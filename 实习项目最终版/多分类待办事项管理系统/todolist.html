<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多分类待办事项管理系统</title>

  <!-- Vue3 CDN 引入 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    /* ==================== 全局重置 ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: #f0f2f5;
      color: #333;
      line-height: 1.6;
    }

    /* ==================== 主容器 ==================== */
    .app-container {
      max-width: 680px;
      margin: 30px auto;
      padding: 0 16px;
    }

    /* ==================== 页面标题 ==================== */
    .page-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #2c3e50;
    }

    /* ==================== 卡片通用样式 ==================== */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    /* ==================== 新增待办表单区域 ==================== */
    .add-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }

    .form-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-item.flex-grow {
      flex: 1;
      min-width: 160px;
    }

    .form-item label {
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }

    .form-item input,
    .form-item select {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-item input:focus,
    .form-item select:focus {
      border-color: #409eff;
    }

    /* 新增按钮 */
    .btn-add {
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #409eff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #3a8ee6;
    }

    /* 校验提示 */
    .form-error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 6px;
      width: 100%;
    }

    /* ==================== 分类筛选 + 操作栏 ==================== */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    /* 分类标签按钮组 */
    .filter-tabs {
      display: flex;
      gap: 6px;
    }

    .filter-tabs button {
      padding: 6px 16px;
      font-size: 13px;
      border: 1px solid #d9d9d9;
      border-radius: 20px;
      background: #fff;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tabs button:hover {
      color: #409eff;
      border-color: #409eff;
    }

    /* 当前选中分类高亮 */
    .filter-tabs button.active {
      background: #409eff;
      color: #fff;
      border-color: #409eff;
    }

    /* 批量清除按钮 */
    .btn-clear {
      padding: 6px 14px;
      font-size: 13px;
      color: #e74c3c;
      background: #fff;
      border: 1px solid #e74c3c;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover {
      background: #e74c3c;
      color: #fff;
    }

    /* ==================== 待办列表 ==================== */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 空状态提示 */
    .empty-tip {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 30px 0;
    }

    /* ==================== 单条待办项 ==================== */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      background: #fff;
      transition: all 0.2s;
    }

    /* 超时任务标红 */
    .todo-item.overdue {
      border-color: #e74c3c;
      background: #fef5f5;
    }

    /* 已完成任务样式 */
    .todo-item.done {
      opacity: 0.55;
    }

    /* 完成状态复选框 */
    .todo-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #409eff;
      flex-shrink: 0;
    }

    /* 待办内容区 */
    .todo-body {
      flex: 1;
      min-width: 0;
    }

    .todo-text {
      font-size: 14px;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    /* 元信息行：分类 + 截止时间 */
    .todo-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    /* 分类小标签 */
    .todo-category {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* 分类颜色区分 */
    .cat-work { background: #e6f7ff; color: #1890ff; }
    .cat-life { background: #f6ffed; color: #52c41a; }
    .cat-study { background: #fff7e6; color: #fa8c16; }

    /* 截止时间 */
    .todo-deadline {
      font-size: 11px;
      color: #999;
    }

    /* 超时提醒文字 */
    .todo-deadline.overdue-text {
      color: #e74c3c;
      font-weight: 600;
    }

    /* 删除按钮 */
    .btn-delete {
      padding: 4px 10px;
      font-size: 12px;
      color: #999;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #e74c3c;
      border-color: #e74c3c;
    }

    /* ==================== 统计栏 ==================== */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 13px;
      color: #888;
    }

    .stats-bar span {
      font-weight: 600;
      color: #409eff;
    }

    /* ==================== 响应式 - 移动端 ==================== */
    @media (max-width: 520px) {
      .app-container {
        margin: 16px auto;
      }

      .add-form {
        flex-direction: column;
      }

      .form-item.flex-grow {
        min-width: 100%;
      }

      .toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .page-title {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="app-container">

      <!-- 页面标题 -->
      <h1 class="page-title">多分类待办事项管理</h1>

      <!-- ==================== 新增待办表单 ==================== -->
      <div class="card">
        <div class="add-form">
          <!-- 待办内容输入 -->
          <div class="form-item flex-grow">
            <label>待办内容</label>
            <input
              type="text"
              v-model="newTodo.text"
              placeholder="输入待办事项..."
              @keyup.enter="addTodo"
            />
          </div>

          <!-- 分类选择 -->
          <div class="form-item">
            <label>分类</label>
            <select v-model="newTodo.category">
              <option value="工作">工作</option>
              <option value="生活">生活</option>
              <option value="学习">学习</option>
            </select>
          </div>

          <!-- 截止时间 -->
          <div class="form-item">
            <label>截止时间</label>
            <input type="datetime-local" v-model="newTodo.deadline" />
          </div>

          <!-- 新增按钮 -->
          <button class="btn-add" @click="addTodo">新增</button>
        </div>

        <!-- 校验错误提示 -->
        <div class="form-error" v-if="formError">{{ formError }}</div>
      </div>

      <!-- ==================== 分类筛选 + 批量操作 ==================== -->
      <div class="card toolbar">
        <!-- 分类标签页 -->
        <div class="filter-tabs">
          <button
            v-for="cat in categories"
            :key="cat"
            :class="{ active: currentFilter === cat }"
            @click="currentFilter = cat"
          >
            {{ cat }}
          </button>
        </div>

        <!-- 批量清除已完成 -->
        <button class="btn-clear" @click="clearCompleted">
          清除已完成 ({{ completedCount }})
        </button>
      </div>

      <!-- ==================== 待办列表 ==================== -->
      <div class="card">
        <div class="todo-list" v-if="filteredTodos.length">
          <div
            class="todo-item"
            v-for="todo in filteredTodos"
            :key="todo.id"
            :class="{
              done: todo.done,
              overdue: isOverdue(todo) && !todo.done
            }"
          >
            <!-- 完成复选框 -->
            <input
              type="checkbox"
              class="todo-checkbox"
              v-model="todo.done"
              @change="saveTodos"
            />

            <!-- 内容区域 -->
            <div class="todo-body">
              <div class="todo-text">{{ todo.text }}</div>
              <div class="todo-meta">
                <!-- 分类标签 -->
                <span class="todo-category" :class="categoryClass(todo.category)">
                  {{ todo.category }}
                </span>
                <!-- 截止时间显示 -->
                <span
                  class="todo-deadline"
                  :class="{ 'overdue-text': isOverdue(todo) && !todo.done }"
                  v-if="todo.deadline"
                >
                  {{ isOverdue(todo) && !todo.done ? '已超时 · ' : '' }}截止：{{ formatDeadline(todo.deadline) }}
                </span>
              </div>
            </div>

            <!-- 删除按钮 -->
            <button class="btn-delete" @click="deleteTodo(todo.id)">删除</button>
          </div>
        </div>

        <!-- 空状态 -->
        <div class="empty-tip" v-else>暂无待办事项，快来添加吧 ~</div>
      </div>

      <!-- ==================== 统计信息 ==================== -->
      <div class="stats-bar">
        共 <span>{{ todos.length }}</span> 条，
        未完成 <span>{{ uncompletedCount }}</span> 条，
        已超时 <span>{{ overdueCount }}</span> 条
      </div>

    </div>
  </div>

  <script>
    // ==================== Vue3 应用 ====================
    var app = Vue.createApp({
      data: function () {
        return {
          // 分类选项
          categories: ['全部', '工作', '生活', '学习'],

          // 当前筛选分类
          currentFilter: '全部',

          // 新增表单数据
          newTodo: {
            text: '',
            category: '工作',
            deadline: ''
          },

          // 表单校验错误
          formError: '',

          // 待办列表（从 localStorage 恢复或为空）
          todos: []
        };
      },

      // ---------- 计算属性 ----------
      computed: {
        // 根据当前筛选分类，返回过滤后的列表
        filteredTodos: function () {
          var filter = this.currentFilter;
          if (filter === '全部') {
            return this.todos;
          }
          return this.todos.filter(function (todo) {
            return todo.category === filter;
          });
        },

        // 已完成数量
        completedCount: function () {
          return this.todos.filter(function (t) { return t.done; }).length;
        },

        // 未完成数量
        uncompletedCount: function () {
          return this.todos.filter(function (t) { return !t.done; }).length;
        },

        // 超时且未完成数量
        overdueCount: function () {
          var self = this;
          return this.todos.filter(function (t) {
            return self.isOverdue(t) && !t.done;
          }).length;
        }
      },

      methods: {
        // ---------- 新增待办 ----------
        addTodo: function () {
          // 非空校验
          if (!this.newTodo.text.trim()) {
            this.formError = '请输入待办内容';
            return;
          }
          this.formError = '';

          // 构建待办对象
          var todo = {
            id: Date.now(),                        // 用时间戳作为唯一ID
            text: this.newTodo.text.trim(),        // 待办内容
            category: this.newTodo.category,       // 分类
            deadline: this.newTodo.deadline || '',  // 截止时间（可选）
            done: false                            // 完成状态
          };

          // 添加到列表头部（最新的在前）
          this.todos.unshift(todo);

          // 持久化到 localStorage
          this.saveTodos();

          // 重置表单
          this.newTodo.text = '';
          this.newTodo.deadline = '';
        },

        // ---------- 删除单条待办 ----------
        deleteTodo: function (id) {
          this.todos = this.todos.filter(function (todo) {
            return todo.id !== id;
          });
          this.saveTodos();
        },

        // ---------- 批量清除已完成 ----------
        clearCompleted: function () {
          this.todos = this.todos.filter(function (todo) {
            return !todo.done;
          });
          this.saveTodos();
        },

        // ---------- 判断是否超时 ----------
        isOverdue: function (todo) {
          // 没有截止时间则不超时
          if (!todo.deadline) return false;
          // 截止时间早于当前时间即为超时
          return new Date(todo.deadline) < new Date();
        },

        // ---------- 格式化截止时间显示 ----------
        formatDeadline: function (deadline) {
          if (!deadline) return '';
          var d = new Date(deadline);
          var month = d.getMonth() + 1;
          var day = d.getDate();
          var hour = String(d.getHours()).padStart(2, '0');
          var min = String(d.getMinutes()).padStart(2, '0');
          return month + '月' + day + '日 ' + hour + ':' + min;
        },

        // ---------- 返回分类对应的CSS类名 ----------
        categoryClass: function (category) {
          if (category === '工作') return 'cat-work';
          if (category === '生活') return 'cat-life';
          if (category === '学习') return 'cat-study';
          return '';
        },

        // ---------- 存入 localStorage ----------
        saveTodos: function () {
          localStorage.setItem('todolist-data', JSON.stringify(this.todos));
        },

        // ---------- 从 localStorage 读取 ----------
        loadTodos: function () {
          var saved = localStorage.getItem('todolist-data');
          if (saved) {
            try {
              this.todos = JSON.parse(saved);
            } catch (e) {
              this.todos = [];
            }
          }
        }
      },

      // 组件挂载时恢复数据
      mounted: function () {
        this.loadTodos();
      }
    });

    // 挂载应用
    app.mount('#app');
  </script>
</body>
</html>
